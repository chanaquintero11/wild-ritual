<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Rituäl Coffee — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="coming-soon-container">
        <div class="coming-soon-content">
            <img src="assets/images/wr-seal.svg" alt="" class="seal-mark" aria-hidden="true">

            <img src="assets/images/wr-stacked.svg" alt="Wild Rituäl Coffee" class="logo-svg">

            <div class="divider"></div>

            <div class="coming-soon-message">
                <p class="accent-label">Coming Soon</p>
                <p class="body-copy">We're brewing something special.<br>Get ready for an extraordinary coffee experience.</p>
            </div>

            <div class="email-signup">
                <form id="emailForm">
                    <input
                        type="email"
                        placeholder="Your email address"
                        required
                        id="emailInput"
                    >
                    <button type="submit" class="signup-btn">Notify Me</button>
                </form>
                <p class="signup-message" id="signupMessage"></p>
            </div>

            <div class="social-links">
                <div class="social-icons">
                    <a href="https://www.instagram.com/wildritualcoffee" target="_blank" rel="noopener" class="social-icon">Instagram</a>
                    <a href="https://www.facebook.com/wildritualcoffee" target="_blank" rel="noopener" class="social-icon">Facebook</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script-coming-soon.js"></script>
</body>
</html>
