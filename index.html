<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Ritual - Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="coming-soon-container">
        <div class="coming-soon-content">
            <h1 class="logo-large">Wild Ritual</h1>
            <p class="tagline">Crafted for the Bold. Brewed for the Bold.</p>
            
            <div class="coming-soon-message">
                <h2>Coming Soon</h2>
                <p>We're brewing something special. Get ready for an extraordinary coffee experience.</p>
            </div>

            <div class="email-signup">
                <form id="emailForm">
                    <input 
                        type="email" 
                        placeholder="Enter your email" 
                        required
                        id="emailInput"
                    >
                    <button type="submit" class="signup-btn">Notify Me</button>
                </form>
                <p class="signup-message" id="signupMessage"></p>
            </div>

            <div class="social-links">
                <p>Follow us on social media:</p>
                <div class="social-icons">
                    <a href="#" class="social-icon">Instagram</a>
                    <a href="#" class="social-icon">Facebook</a>
                    <a href="#" class="social-icon">Twitter</a>
                </div>
            </div>
        </div>

        <div class="coffee-cup">☕</div>
    </div>

    <script src="script-coming-soon.js"></script>
</body>
</html>
